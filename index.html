<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>मेरा टी-शर्ट स्टोर</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; }
        .header { background: #333; color: white; padding: 20px; }
        .product { background: white; margin: 20px; padding: 15px; border-radius: 10px; display: inline-block; width: 250px; }
        .price { color: green; font-weight: bold; font-size: 20px; }
        button { background: #ff9900; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h1>स्वागत है मेरे टी-शर्ट स्टोर पर!</h1>
    </div>
    
    <div class="product">
        <img src="https://via.placeholder.com/200" alt="T-shirt" width="200">
        <h3>शानदार कॉटन टी-शर्ट</h3>
        <p class="price">₹499</p>
        <button>अभी खरीदें</button>
    </div>

    <div class="product">
        <h3>प्रिंटेड टी-शर्ट</h3>
        <p class="price">₹599</p>
        <button>अभी खरीदें</button>
    </div>
</body>
</html>
